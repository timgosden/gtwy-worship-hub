<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Song Bank — Worship Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav id="site-nav"></nav>
<div class="drawer" id="drawer"></div>

<div class="page">
  <div class="page-inner">

    <div class="section-label">Resources</div>
    <h1 class="page-title">Song<span>Bank</span></h1>
    <div class="rule left"></div>
    <p class="page-desc">
      Our approved song list for Central and Chapel services.
    </p>

    <div class="section-block">

      <input
        class="form-input"
        id="song-search"
        type="search"
        placeholder="Search songs, themes, first lines or CCLI numbers…"
        style="margin-bottom:16px"
        oninput="filterSongs(this.value)"
      />

      <div id="song-list"><p class="song-loading">Loading…</p></div>

    </div>

  </div>
</div>

<footer>
  <a href="https://gatewayvineyard.church">GatewayVineyard.Church</a>
  <p>Worship Team Hub</p>
</footer>

<script src="nav.js"></script>
<script>
var SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtNUsL0_HwRl1yIgsjSw2StvJCmg--YZB1UN3dgkRSEZoxTwY2BoRcCL9Vvd8osQ/pub?gid=1919290250&single=true&output=csv';

// Columns: Song Title, First Line, CCLI, Section, Themes, Notes
var allSections = [];

function parseCSV(text) {
  var lines = text.replace(/\r/g, '').split('\n');
  return lines.map(function(line) {
    var cells = [], cur = '', inQ = false;
    for (var i = 0; i < line.length; i++) {
      var c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cells.push(cur.trim());
    return cells;
  });
}

function buildSections(rows) {
  var sectionsMap = {};
  var sectionOrder = [];

  rows.forEach(function(row) {
    var title   = row[0] || '';
    var firstLine = row[1] || '';
    var ccli    = row[2] || '';
    var section = row[3] || '';
    var themes  = row[4] || '';
    var notes   = row[5] || '';

    if (!title || title === 'Song Title') return;
    if (title.indexOf('SONGBANK') >= 0 || title.indexOf('SONG BANK') >= 0) return;
    if (!section) return;

    if (!sectionsMap[section]) {
      sectionsMap[section] = [];
      sectionOrder.push(section);
    }

    sectionsMap[section].push({ title: title, firstLine: firstLine, ccli: ccli, themes: themes, notes: notes });
  });

  return sectionOrder.map(function(s) {
    return { section: s, songs: sectionsMap[s] };
  });
}

function sectionClass(name) {
  var s = name.toUpperCase();
  if (s.indexOf('GATHERING') >= 0 || s.indexOf('CALL TO WORSHIP') >= 0) return 'sc-gathering';
  if (s.indexOf('REVELATION') >= 0) return 'sc-revelation';
  if (s.indexOf('RESPONSE') >= 0 || s.indexOf('ENCOUNTER') >= 0 || s.indexOf('INTIMACY') >= 0) return 'sc-response';
  if (s.indexOf('VINEYARD') >= 0 || s.indexOf('HOMEGROWN') >= 0 || s.indexOf('GATEWAY') >= 0) return 'sc-homegrown';
  return '';
}

function themeBadge(themes) {
  if (!themes) return '';
  return '<span class="song-chip sc-theme">' + esc(themes) + '</span>';
}

function notesBadge(notes) {
  if (!notes) return '';
  var lower = notes.toLowerCase();
  var cls = lower.indexOf('classic') >= 0 ? 'song-chip key' :
            lower.indexOf('homegrown') >= 0 ? 'song-chip homegrown' :
            lower.indexOf('vineyard') >= 0 || lower.indexOf('kxc') >= 0 ? 'song-chip vineyard' :
            'song-chip';
  return '<span class="' + cls + '">' + esc(notes) + '</span>';
}

function renderSections(sections) {
  var el = document.getElementById('song-list');
  var total = sections.reduce(function(n, s) { return n + s.songs.length; }, 0);

  if (!total) {
    el.innerHTML = '<p style="color:var(--muted);font-size:13px;font-style:italic">No songs found.</p>';
    return;
  }

  var html = '';
  sections.forEach(function(s) {
    if (!s.songs.length) return;
    var sc = sectionClass(s.section);
    html += '<p class="rota-month-heading' + (sc ? ' ' + sc : '') + '">' + esc(s.section) + '</p>';
    s.songs.forEach(function(song) {
      var ccliLink = song.ccli ? 'https://songselect.ccli.com/Songs/' + esc(song.ccli) : '';
      var titleEl = ccliLink
        ? '<a class="song-title" href="' + ccliLink + '" target="_blank" rel="noopener">' + esc(song.title) + '</a>'
        : '<span class="song-title">' + esc(song.title) + '</span>';

      html += '<div class="song-row' + (sc ? ' ' + sc : '') + '">'
        + '<div class="song-main">'
        + titleEl
        + (song.firstLine ? '<span class="song-first-line">' + esc(song.firstLine) + '</span>' : '')
        + '</div>'
        + '<div class="song-meta">'
        + themeBadge(song.themes)
        + notesBadge(song.notes)
        + '</div>'
        + '</div>';
    });
  });

  el.innerHTML = html;
}

function filterSongs(query) {
  var q = query.toLowerCase().trim();
  if (!q) { renderSections(allSections); return; }

  var filtered = allSections.map(function(s) {
    return {
      section: s.section,
      songs: s.songs.filter(function(song) {
        return (song.title + ' ' + song.firstLine + ' ' + song.ccli + ' ' + song.themes + ' ' + song.notes)
          .toLowerCase().indexOf(q) >= 0;
      })
    };
  });

  renderSections(filtered);
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

fetch(SHEET_URL)
  .then(function(r) { return r.text(); })
  .then(function(text) {
    var rows = parseCSV(text);
    allSections = buildSections(rows);
    renderSections(allSections);
  })
  .catch(function() {
    document.getElementById('song-list').innerHTML =
      '<p style="color:var(--muted);font-size:13px">Couldn\'t load the song list — please try again shortly.</p>';
  });
</script>
</body>
</html>
